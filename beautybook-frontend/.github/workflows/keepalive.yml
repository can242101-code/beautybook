name: Keepalive Railway

on:
  schedule:
    - cron: '*/5 * * * *'   # cada 5 minutos
  workflow_dispatch:          # también se puede lanzar manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend Railway
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://beautybook-backend-production-7474.up.railway.app/api/health)
          echo "Health check HTTP $STATUS"
          [ "$STATUS" = "200" ] && echo "✅ Backend activo" || echo "⚠️ Backend no respondió"
