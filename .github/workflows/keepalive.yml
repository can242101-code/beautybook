name: Keepalive Backend

on:
  schedule:
    # Cada 5 minutos — evita cold starts en Railway
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 20 \
            https://beautybook-backend-production-7474.up.railway.app/api/health)
          echo "Backend status: $STATUS"
          [ "$STATUS" = "200" ] && echo "OK" || echo "WARN: respuesta $STATUS"
